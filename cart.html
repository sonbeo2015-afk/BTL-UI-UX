<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giỏ hàng - TSOT</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <style>
      :root {
        --primary-color: rgb(127, 52, 66);
        --bg-creme: #fcf9f4;
      }
      body {
        background-color: var(--bg-creme);
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      .hero-title {
        font-family: "Noto Serif", serif;
        font-style: italic;
        color: var(--primary-color);
      }
      .cart-item {
        border-bottom: 1px solid rgba(127, 52, 66, 0.1);
        padding: 25px 0;
      }
      .product-img-cart {
        width: 100px;
        height: 100px;
        background: #f5f5f4;
        border-radius: 50%;
        padding: 10px;
        object-fit: contain;
      }
      /* Style cho chữ QUAY LẠI */
      .btn-back {
        background: none;
        border: none;
        color: var(--primary-color);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 0;
        margin-bottom: 3rem;
        cursor: pointer;
        font-weight: 700;
        text-transform: uppercase;
        font-size: 13px;
        letter-spacing: 1px;
        font-family: "Plus Jakarta Sans", sans-serif;
        position: relative; /* Quan trọng để định vị vạch kẻ */
      }

      /* Hiệu ứng vạch kẻ cho nút Quay lại */
      .btn-back span {
        position: relative;
      }

      .btn-back span::after {
        content: "";
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -4px;
        left: 0;
        background-color: var(--primary-color);
        transition: width 0.3s ease-in-out;
      }

      .btn-back:hover span::after {
        width: 100%;
      }

      .btn-remove {
        font-size: 11px;
        text-transform: uppercase;
        color: var(--primary-color);
        font-weight: 700;
        cursor: pointer;
        border: none;
        background: none;
        padding: 5px 0;
        margin-top: 10px;
        letter-spacing: 1px;
        font-family: "Plus Jakarta Sans", sans-serif;
        position: relative;
        transition: opacity 0.3s;
      }

      /* Hiệu ứng vạch kẻ cho nút Gỡ */
      .btn-remove::after {
        content: "";
        position: absolute;
        width: 0;
        height: 1.5px;
        bottom: 0;
        left: 0;
        background-color: var(--primary-color);
        transition: width 0.3s ease-in-out;
      }

      .btn-remove:hover::after {
        width: 100%;
      }

      .btn-remove:hover {
        opacity: 0.8;
      }
      .summary-card {
        background: white;
        border-radius: 24px;
        padding: 40px;
        border: 1px solid rgba(127, 52, 66, 0.05);
      }

      .quantity-wrapper {
        display: flex;
        align-items: center;
        border: 1px solid #e7e5e4;
        border-radius: 999px;
        padding: 4px 12px;
        background: white;
        width: fit-content;
      }
      .quantity-btn {
        background: none;
        border: none;
        color: #57534e;
        padding: 0 8px;
        cursor: pointer;
        transition: color 0.3s;
        display: flex;
        align-items: center;
      }
      .quantity-btn:hover {
        color: var(--primary-color);
      }
      .qty-display {
        width: 35px;
        text-align: center;
        border: none;
        background: transparent;
        font-size: 0.9rem;
        font-weight: 600;
      }

      .btn-atelier {
        background: var(--primary-color);
        color: white;
        border-radius: 99px;
        width: 100%;
        padding: 16px;
        border: none;
        letter-spacing: 2px;
        transition: all 0.3s ease;
        font-size: 14px;
      }
      .btn-atelier:hover {
        background-color: rgba(127, 52, 66, 0.4);
        color: rgb(127, 52, 66);
      }

      .btn-atelier:active {
        background-color: rgba(127, 52, 66, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <button onclick="history.back()" class="btn-back">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
        <span>QUAY LẠI</span>
      </button>

      <h1 class="hero-title display-4 mb-5">Giỏ hàng</h1>

      <div class="row g-5">
        <div class="col-lg-7" id="cart-list"></div>

        <div class="col-lg-5">
          <div class="summary-card shadow-sm">
            <h4 class="hero-title mb-4">Hóa đơn</h4>
            <div class="d-flex justify-content-between mb-3">
              <span class="text-muted">Tạm tính</span>
              <span id="subtotal" class="fw-bold text-dark">0đ</span>
            </div>
            <div class="d-flex justify-content-between mb-3">
              <span class="text-muted">Phí vận chuyển (10%)</span>
              <span id="shipping" class="fw-bold text-dark">0đ</span>
            </div>
            <hr class="my-4" style="opacity: 0.1" />
            <div class="d-flex justify-content-between mb-4">
              <span class="fw-bold">TỔNG CỘNG</span>
              <span
                class="fw-bold h3"
                id="grand-total"
                style="color: var(--primary-color) !important"
                >0đ</span
              >
            </div>
            <button class="btn-atelier fw-bold">THANH TOÁN NGAY</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      function renderCart() {
        const cart = JSON.parse(localStorage.getItem("tsot_cart")) || [];
        const container = document.getElementById("cart-list");
        let html = "";
        let subtotal = 0;

        if (cart.length === 0) {
          container.innerHTML = `<div class="py-5 text-center"><p class="text-muted">Giỏ hàng của bạn hiện đang trống.</p></div>`;
          updateBill(0);
          return;
        }

        cart.forEach((item, index) => {
          subtotal += item.price * item.quantity;
          html += `
            <div class="cart-item d-flex align-items-center gap-4">
                <img src="${item.img}" class="product-img-cart">
                <div class="flex-grow-1">
                    <h5 class="mb-0 fw-bold">${item.name}</h5>
                    <p class="small text-muted mb-0">${item.price.toLocaleString()}đ</p>
                    <button onclick="removeItem(${index})" class="btn-remove">Gỡ khỏi giỏ hàng</button>
                </div>
                <div class="quantity-wrapper">
                    <button onclick="changeQty(${index}, -1)" class="quantity-btn">
                        <span class="material-symbols-outlined" style="font-size: 18px">remove</span>
                    </button>
                    <span class="qty-display">${item.quantity}</span>
                    <button onclick="changeQty(${index}, 1)" class="quantity-btn">
                        <span class="material-symbols-outlined" style="font-size: 18px">add</span>
                    </button>
                </div>
            </div>`;
        });

        container.innerHTML = html;
        updateBill(subtotal);
      }

      function updateBill(subtotal) {
        const shipping = subtotal * 0.1;
        document.getElementById("subtotal").innerText =
          subtotal.toLocaleString() + "đ";
        document.getElementById("shipping").innerText =
          shipping.toLocaleString() + "đ";
        document.getElementById("grand-total").innerText =
          (subtotal + shipping).toLocaleString() + "đ";
      }

      window.changeQty = (index, delta) => {
        let cart = JSON.parse(localStorage.getItem("tsot_cart"));
        cart[index].quantity += delta;
        if (cart[index].quantity < 1) cart[index].quantity = 1;
        localStorage.setItem("tsot_cart", JSON.stringify(cart));
        renderCart();
      };

      window.removeItem = (index) => {
        let cart = JSON.parse(localStorage.getItem("tsot_cart"));
        cart.splice(index, 1);
        localStorage.setItem("tsot_cart", JSON.stringify(cart));
        renderCart();
      };

      renderCart();
    </script>
  </body>
</html>
