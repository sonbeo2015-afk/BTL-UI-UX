<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tài khoản - TSOT</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <style>
      :root {
        --primary-color: rgb(127, 52, 66);
        --bg-creme: #fcf9f4;
      }
      body {
        background-color: var(--bg-creme);
        font-family: "Plus Jakarta Sans", sans-serif;
        min-height: 100vh;
        margin: 0;
      }

      .top-left-wrapper {
        position: absolute;
        top: 40px;
        left: 40px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }

      /* Nút quay lại dùng history.back() */
      .btn-back {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
      }

      .btn-back span:last-child {
        position: relative;
        padding-bottom: 2px;
      }

      .btn-back span:last-child::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        width: 0;
        height: 2px;
        background-color: var(--primary-color);
        transition: width 0.3s ease-in-out;
      }

      .btn-back:hover span:last-child::after {
        width: 100%;
      }

      .welcome-text {
        font-family: "Noto Serif", serif;
        font-style: italic;
        color: var(--primary-color);
        font-size: 2rem;
        margin: 0;
      }

      .btn-atelier {
        background-color: var(--primary-color);
        color: white;
        border-radius: 9999px;
        height: 42px;
        padding: 0 25px;
        letter-spacing: 0.1em;
        border: none;
        transition: 0.3s;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-atelier:hover {
        background-color: rgba(127, 52, 66, 0.4);
        color: rgb(127, 52, 66);
      }
    </style>
  </head>
  <body>
    <div class="top-left-wrapper">
      <button onclick="history.back()" class="btn-back">
        <span class="material-symbols-outlined">arrow_back</span>
        <span>Quay lại</span>
      </button>

      <h1 id="welcome-msg" class="welcome-text">
        Chào mừng khách đến với TSOT Lipstick
      </h1>

      <button onclick="logout()" class="btn-atelier">ĐĂNG XUẤT</button>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const user = JSON.parse(localStorage.getItem("tsot_user"));
        const welcomeMsg = document.getElementById("welcome-msg");

        if (user && user.fullName) {
          welcomeMsg.innerText = `Chào mừng ${user.fullName} đến với TSOT Lipstick`;
        } else {
          window.location.href = "login.html";
        }
      });

      function logout() {
        localStorage.removeItem("tsot_user");
        window.location.href = "index.html";
      }
    </script>
  </body>
</html>
