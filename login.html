    <style>
      :root {
        --primary-color: rgb(127, 52, 66);
        --faded-color: rgba(127, 52, 66, 0.3);
        --bg-creme: #fcf9f4;
      }
      .back-to-home {
        position: absolute;
        top: 20px;
        left: 20px;
        background-color: var(--primary-color);
        color: white;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 5px;
        font-weight: 600;
        font-size: 0.9rem;
        transition: all 0.3s ease;
        z-index: 10;
        padding: 5px 10px;
        border-radius: 20px;
        cursor: pointer; /* Thêm dòng này */
      }

      .back-to-home:hover {
        background-color: var(--faded-color);
        color: var(--primary-color);
      }
      @media (max-width: 576px) {
        /* Bỏ định vị tuyệt đối trên mobile để card co giãn theo nội dung */
        .container.position-absolute {
          position: relative;
          top: 0;
          left: 0;
          translate: 0 0;
          width: calc(100% - 30px);
          margin: auto;
        }
        .p-5 {
          padding: 0.5rem !important;
        }
        .mb-5 {
          margin-bottom: 0.5rem !important;
        }
      }
      .font-serif {
        font-family: "Noto Serif", serif;
      }
      .font-sans {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      .font-serif.fst-italic {
        font-size: clamp(1.5rem, 5vw, 2rem) !important;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px 0;
        font-family: "Plus Jakarta Sans", sans-serif;
        background: var(--faded-color);
        position: relative;
        z-index: 0;
      }
      .slideshow-column {
        padding: 0 !important;
        overflow: hidden;
        position: relative;
        border-radius: 2rem 0 0 2rem;
        display: flex;
      }

      .img-wrapper {
        width: 100%;
        height: 100%;
      }

      .static-lipstick-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: brightness(0.8);
        transition: transform 0.7s ease;
      }

      .slideshow-column:hover .static-lipstick-img {
        transform: scale(1.1);
      }
      .custom-input-group {
        width: 100%;
        max-width: 22rem;
        margin-bottom: 2rem;
      }

      .input-header {
        color: var(--primary-color);
        gap: 0.5rem;
        opacity: 0.8;
        transition: opacity 0.3s ease;
        margin-bottom: 0.5rem;
      }

      .small-label {
        font-size: clamp(0.65rem, 2vw, 0.8rem);
        letter-spacing: 0.12em;
        font-weight: 700;
      }
      .custom-input-group {
        position: relative; /* Quan trọng để định vị ::after */
        width: 100%;
        max-width: 22rem;
        margin-bottom: 2rem;
      }
      /* 3. Tạo đường viền giả bằng ::after */
      .custom-input-group::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 2px; /* Độ dày bằng với border cũ */
        background-color: var(--primary-color);

        /* Hiệu ứng kéo từ trái sang */
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.3s ease;
      }

      /* 4. Khi focus vào input bên trong group thì kích hoạt ::after */
      .custom-input-group:focus-within::after {
        transform: scaleX(1);
      }
      .text-input {
        font-size: clamp(0.9rem, 2.5vw, 1rem);
        width: 100%;
        border: 0;
        /* Giữ border mờ nhạt ban đầu */
        border-bottom: 2px solid rgba(127, 52, 66, 0.1);
        padding: 10px 0;
        background: transparent;
        transition: all 0.3s ease;
      }

      .text-input::placeholder {
        color: rgba(127, 52, 66, 0.5);
        font-weight: 300;
      }

      .text-input:focus {
        outline: none !important;
        box-shadow: none !important;
        /* Bỏ border-bottom đậm cũ đi */
        border-bottom: 2px solid rgba(127, 52, 66, 0.1);
      }
      .form-options {
        width: 100%;
        max-width: 22rem;
        font-size: 0.85rem;
        margin-top: 0rem;
        margin-bottom: 2rem;
      }
      .form-options,
      .create-account {
        font-size: clamp(0.75rem, 2vw, 0.9rem);
      }
      .forgot-password {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 600;
        transition: opacity 0.3s;
      }
      .btn-signin {
        width: 100%;
        padding: 0.5rem;
        border-radius: 50px;
        border: 0;
        max-width: 22rem;
        font-weight: bold;
        background-color: var(--primary-color);
        color: white;
        transition: all 0.3s ease;
        margin-bottom: 1rem;
      }
      .btn-signin:hover {
        background-color: rgba(127, 52, 66, 0.5);
        color: rgba(127, 52, 66);
      }
      .btn-signin:active {
        background-color: rgba(127, 52, 66, 0.3);
        color: rgba(127, 52, 66);
      }
      .forgot-password {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 700;
        position: relative;
        transition: all 0.3s ease;
      }

      .forgot-password::after {
        content: "";
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -3px;
        left: 0;
        background-color: var(--primary-color);
        transition: width 0.3s ease;
      }

      .forgot-password:hover {
        opacity: 0.7;
      }
      .forgot-password:hover::after {
        width: 100%;
      }

      .forgot-password:active {
        opacity: 0.3;
      }
      .form-check-input {
        border: 1px solid rgba(127, 52, 66, 0.25);
        transition: background-color 0.3s;
      }
      .form-check-input:hover {
        background-color: rgba(127, 52, 66, 0.1);
      }
      .form-check-input:checked {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
      }
      .form-check-input:focus {
        box-shadow: 0 0 0 1rem rgb(0, 0, 0);
        border-color: var(--primary-color);
      }
      .divider-container {
        position: relative;
        width: 100%;
        max-width: 22rem;
        text-align: center;
        margin-top: 2rem;
        margin-bottom: 1.5rem;
      }

      .divider-line {
        position: absolute;
        top: 60%;
        left: 0;
        width: 100%;
        height: 1px;
        background-color: var(--primary-color);
        z-index: 1;
      }

      .divider-text {
        position: relative;
        z-index: 2;
        background-color: white;
        padding: 0 15px;
        font-size: clamp(0.55rem, 1.5vw, 0.65rem);
        letter-spacing: 0.2em;
        color: var(--primary-color);
      }

      .social-btn {
        width: 3rem;
        height: 3rem;
        border-radius: 50%;
        border: 1px solid var(--faded-color);
        background: transparent;
        color: var(--primary-color);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        text-decoration: none;
      }
      .social-btn svg {
        width: 1.8rem;
        height: 1.8rem;
        transition: all 0.3s ease;
        display: block;
      }
      .social-btn:hover {
        border-color: var(--primary-color);
        background-color: var(--primary-color);
        color: white;
        transform: translateY(-3px);
      }
      .social-btn:active {
        opacity: 0.7;
      }
      .social-btn:hover svg path {
        fill: currentColor;
        stroke: none;
      }
      .create-account {
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: var(--primary-color);
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      .create-account a {
        margin-left: 0.25rem;
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 700;
        position: relative;
        transition: all 0.3s ease;
      }
      .create-account a::after {
        content: "";
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -4px;
        left: 0;
        background-color: var(--primary-color);
        transition: width 0.3s ease;
      }

      .create-account a:hover {
        opacity: 0.7;
      }
      .create-account a:active {
        opacity: 0.3;
      }
      .create-account a:hover::after {
        width: 100%;
      }
      #login-block,
      #register-block,
      #forgot-block {
        animation: fadeIn 0.5s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0.2;
          transform: translateY(1rem);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tsot-toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: white;
        color: var(--primary-color);
        padding: 16px 24px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(127, 52, 66, 0.15);
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 9999;
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.5s ease;
      }

      .tsot-toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      .tsot-toast .material-symbols-outlined {
        font-size: 20px;
      }

      .toast-message {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
    </style>
  </head>

            <div class="custom-input-group">
              <div class="d-flex align-items-center input-header">
                <svg

                    ></path>

                <label class="text-uppercase small-label font-sans" for="email">

              <input

                id="email"
                name="email"
                placeholder="example@email.com"
                type="email"
                autocomplete="on"
              />
            </div>
            <button class="btn-signin font-sans">GỬI MẬT KHẨU MỚI</button>
            <p class="create-account">
              Đã có tài khoản?
              <a href="javascript:void(0)" onclick="toggleForm('login')">
                Đăng nhập ngay</a

          <div class="divider-container font-sans">
            <div class="divider-line"></div>

          </div>

          <div class="d-flex justify-content-center gap-3 mb-5">

    <script>
      function validateEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
      }
      // 1. Hàm chuyển đổi qua lại giữa các Form
      function toggleForm(type) {
        const login = document.getElementById("login-block");
        const register = document.getElementById("register-block");
        const forgot = document.getElementById("forgot-block");

        [login, register, forgot].forEach((block) => {
          block.classList.add("d-none");
          block.classList.remove("d-flex");
        });

        let target =
          type === "reg" ? register : type === "forgot" ? forgot : login;
        target.classList.remove("d-none");
        target.classList.add("d-flex");
      }

      // 2. Hàm hiển thị Toast Custom
      function showToast(msg, isError = false) {
        const toast = document.getElementById("toast-container");
        const toastText = document.getElementById("toast-text");
        const toastIcon = toast.querySelector(".material-symbols-outlined");

        // Cập nhật nội dung & icon
        toastText.innerText = msg;
        if (isError) {
          toast.style.color = "#dc3545"; // Màu đỏ lỗi
          toastIcon.innerText = "error";
        } else {
          toast.style.color = "var(--primary-color)"; // Màu chính
          toastIcon.innerText = "check_circle";
        }

        // Hiển thị animation
        toast.classList.add("show");

        // Tự động ẩn sau 3 giây
        setTimeout(() => {
          toast.classList.remove("show");
        }, 3000);
      }

      // 3. XỬ LÝ ĐĂNG KÝ (Register)
      const regBlock = document.getElementById("register-block");
      const btnReg = regBlock.querySelector(".btn-signin");

      btnReg.onclick = function () {
        const inputs = regBlock.querySelectorAll("input");
        const fullName = inputs[0].value;
        const email = inputs[1].value;
        const pass = inputs[2].value;
        const confirmPass = inputs[3].value;

        if (!fullName || !email || !pass) {
          showToast("Vui lòng điền đầy đủ thông tin!", true);
          return;
        }

        // Check định dạng email
        if (!validateEmail(email)) {
          showToast("Định dạng Email không hợp lệ!", true);
          return;
        }

        if (pass !== confirmPass) {
          showToast("Mật khẩu xác nhận không khớp!", true);
          return;
        }

        let users = JSON.parse(localStorage.getItem("tsot_users")) || [];
        if (users.find((u) => u.email === email)) {
          showToast("Email này đã được đăng ký!", true);
          return;
        }

        users.push({ fullName, email, pass });
        localStorage.setItem("tsot_users", JSON.stringify(users));

        showToast("Đăng ký thành công! Đang chuyển sang Đăng nhập...");
        setTimeout(() => toggleForm("login"), 1500);
      };

      // 4. XỬ LÝ ĐĂNG NHẬP (Login)
      const loginBlock = document.getElementById("login-block");
      const btnLogin = loginBlock.querySelector(".btn-signin");

      btnLogin.onclick = function () {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;

        if (!email || !pass) {
          showToast("Vui lòng nhập Email và Mật khẩu!", true);
          return;
        }

        // Kiểm tra trong LocalStorage
        let users = JSON.parse(localStorage.getItem("tsot_users")) || [];
        const user = users.find((u) => u.email === email && u.pass === pass);

        if (user) {
          showToast("Chào mừng " + user.fullName + " đã quay lại!");
          // LƯU Ý: Phải lưu vào key "tsot_user" (số ít) để các trang khác nhận diện được phiên đăng nhập
          localStorage.setItem("tsot_user", JSON.stringify(user));

          setTimeout(() => {
            window.location.href = "index.html";
          }, 2000);
        } else {
          showToast("Email hoặc mật khẩu không đúng!", true);
        }
      };

      // 5. XỬ LÝ QUÊN MẬT KHẨU (Forgot Password)
      const forgotBlock = document.getElementById("forgot-block");
      const btnForgot = forgotBlock.querySelector(".btn-signin");

      btnForgot.onclick = function () {
        const emailInput = forgotBlock.querySelector("input");
        const email = emailInput.value;

        if (!email || !validateEmail(email)) {
          showToast("Vui lòng nhập Email hợp lệ!", true);
          return;
        }

        let users = JSON.parse(localStorage.getItem("tsot_users")) || [];
        const userIndex = users.findIndex((u) => u.email === email);

        if (userIndex !== -1) {
          // 1. Tạo mật khẩu mới
          const newPass = Math.random().toString(36).slice(-6);

          // 2. Cập nhật localStorage (Cực kỳ quan trọng để tí nữa đăng nhập được)
          users[userIndex].pass = newPass;
          localStorage.setItem("tsot_users", JSON.stringify(users));

          // 3. Gửi Email qua EmailJS
          // Các tham số: ("SERVICE_ID", "TEMPLATE_ID", { BIẾN TRUYỀN VÀO }, "PUBLIC_KEY")
          emailjs
            .send(
              "service_oui51i6",
              "template_l70ll8j",
              {
                to_email: email, // Biến này nếu bạn dùng trong mục 'To Email' của template
                new_password: newPass, // Tên này phải TRÙNG KHỚP với {{new_password}} trong template
                user_name: users[userIndex].fullName, // Gửi kèm tên cho thân thiện nếu muốn
              },
              "gJbv72fqJ9Jt9JSJn",
            )
            .then(() => {
              showToast("Mật khẩu mới đã được gửi vào Email của bạn!");
              setTimeout(() => toggleForm("login"), 3000);
            })
            .catch((err) => {
              console.error("Lỗi EmailJS:", err);
              showToast("Không thể gửi email. Vui lòng thử lại!", true);
            });
        } else {
          showToast("Email này chưa được đăng ký!", true);
        }
      };
    </script>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
    <script type="text/javascript">
      (function () {
        emailjs.init("gJbv72fqJ9Jt9JSJn");
      })();
    </script>
