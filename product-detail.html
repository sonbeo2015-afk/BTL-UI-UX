<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">Sản phẩm - TSOT Lipsticks</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />

    <style>
      :root {
        --primary-color: rgb(127, 52, 66);
        --faded-color: rgba(127, 52, 66, 0.3);
        --bg-creme: #fcf9f4;
      }
      body {
        background-color: var(--bg-creme);
        color: #1c1917;
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      /* --- NAVBAR --- */
      .navbar-custom {
        background-color: var(--bg-creme);
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        padding: 1rem 2rem;
      }
      .brand-name {
        font-family: "Noto Serif", serif;
        font-style: italic;
        font-weight: 500;
        color: var(--primary-color);
        font-size: 1.5rem;
        text-decoration: none;
      }
      .nav-link-custom {
        font-family: "Plus Jakarta Sans", sans-serif;
        font-size: 11px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #57534e !important;
        transition: all 0.3s ease;
        font-weight: 500;
        position: relative;
        padding: 0.5rem 0 !important;
        margin: 0 1.5rem;
        display: inline-block;
        text-decoration: none;
      }
      .nav-link-custom::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 1px;
        background-color: var(--primary-color);
        transition: width 0.3s ease;
      }
      .nav-link-custom:hover::after {
        width: 100%;
      }

      .search-input-wrapper {
        border-bottom: 2px solid rgba(127, 52, 66, 0.1);
        display: flex;
        align-items: center;
        padding-bottom: 5px;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        width: 28px;
        overflow: hidden;
        white-space: nowrap;
      }
      .search-icon {
        cursor: pointer;
        font-size: 20px !important;
        color: var(--primary-color);
        flex-shrink: 0;
      }
      .search-input-wrapper input {
        border: none;
        background: transparent;
        font-size: 10px;
        letter-spacing: 0.12em;
        outline: none;
        width: 0;
        opacity: 0;
        transition: all 0.3s ease;
      }
      .search-input-wrapper.active {
        width: 160px;
        border-bottom: 2px solid var(--primary-color);
      }
      .search-input-wrapper.active input {
        width: 120px;
        opacity: 1;
        margin-left: 8px;
      }

      .cart-btn {
        position: relative;
        color: var(--primary-color);
      }
      .cart-badge {
        position: absolute;
        top: -5px;
        right: -8px;
        background-color: var(--primary-color);
        color: white;
        font-size: 9px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        display: none;
        align-items: center;
        justify-content: center;
      }

      /* --- PRODUCT DETAIL --- */
      .product-circle-bg {
        background-color: #f5f5f4;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        aspect-ratio: 1/1;
        overflow: hidden;
      }
      .product-circle-bg img {
        width: 80%;
        height: 80%;
        object-fit: contain;
      }
      .hero-title {
        font-family: "Noto Serif", serif;
        font-style: italic;
        font-weight: 300;
        line-height: 1.1;
        color: var(--primary-color);
      }
      .hero-subtitle {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.4em;
        color: var(--primary-color);
        opacity: 0.7;
      }
      #product-price {
        color: var(--primary-color) !important;
        font-weight: 300;
      }
      /* --- CẬP NHẬT NÚT ADD TO CART --- */
      .btn-atelier {
        background-color: var(--primary-color);
        color: white;
        border-radius: 9999px;
        height: 42px; /* Đặt chiều cao cố định để dễ căn chỉnh */
        padding: 0 25px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border: none;
        transition: 0.3s;

        /* Thêm các thuộc tính này để center nội dung */
        display: inline-flex;
        align-items: center; /* Căn giữa trục dọc */
        justify-content: center; /* Căn giữa trục ngang */
        gap: 10px; /* Khoảng cách giữa icon và text */
      }

      /* Đảm bảo icon Material Symbol cũng được căn giữa */
      .btn-atelier .material-symbols-outlined {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 0; /* Loại bỏ margin thừa nếu có */
      }
      .btn-atelier:hover {
        background-color: rgba(127, 52, 66, 0.4);
        color: rgb(127, 52, 66);
      }
      .btn-atelier:active {
        background-color: rgba(127, 52, 66, 0.1);
      }
      /* --- QUANTITY SELECTOR REFINED --- */
      .quantity-selector {
        display: flex;
        align-items: center;
        justify-content: space-between; /* Khoảng cách đều giữa các phần tử */
        border: 1px solid var(--primary-color);
        border-radius: 999px;
        background-color: var(--bg-creme);
        padding: 2px 8px; /* Giảm padding để nút bé hơn */
        width: 100px; /* Chiều rộng cố định để kiểm soát kích thước nút */
        height: 36px; /* Chiều cao cố định */
      }

      .quantity-btn {
        background: none;
        border: none;
        color: var(--primary-color);
        font-size: 1.2rem;
        cursor: pointer;
        width: 24px; /* Chiều rộng nút bấm bằng chiều cao để tạo hình vuông ngầm */
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center; /* Căn giữa dấu - và + */
        padding: 0;
        transition: opacity 0.2s;
      }

      .quantity-btn:hover {
        opacity: 0.6;
      }

      .quantity-input {
        width: 30px;
        text-align: center;
        border: none;
        background: none;
        font-weight: 600;
        color: var(--primary-color);
        outline: none;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0; /* Loại bỏ margin mặc định */
      }

      /* Ẩn mũi tên tăng giảm mặc định của input number */
      .quantity-input::-webkit-outer-spin-button,
      .quantity-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .breadcrumb-item a {
        color: #8c8a87;
        text-decoration: none;
        transition: color 0.3s;
      }
      .breadcrumb-item a:hover {
        color: var(--primary-color);
      }
      .breadcrumb-item.active {
        color: var(--primary-color) !important;
        font-weight: 600;
      }
      .breadcrumb-item + .breadcrumb-item::before {
        content: "—";
        color: var(--faded-color);
        padding: 0 10px;
      }

      .footer-custom {
        background-color: var(--primary-color);
        color: white;
        padding: 1.5rem 0;
        margin-top: 5rem;
      }
      .btn-scroll-top {
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.3);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
      }
      /* --- TOAST NOTIFICATION --- */
      .tsot-toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: white;
        color: var(--primary-color);
        padding: 16px 24px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(127, 52, 66, 0.15);
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 9999;
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.5s ease;
      }

      .tsot-toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      .tsot-toast .material-symbols-outlined {
        font-size: 20px;
      }

      .toast-message {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-md sticky-top navbar-custom">
      <div class="container-xl">
        <a class="brand-name" href="home_temp.html">TSOT</a>

        <div class="d-flex align-items-center gap-3 order-md-3">
          <div class="search-container d-flex align-items-center">
            <div class="search-input-wrapper expand-search" id="searchWrapper">
              <span
                class="material-symbols-outlined search-icon"
                id="searchToggle"
                >search</span
              >
              <input type="text" placeholder="TÌM KIẾM" id="searchInput" />
            </div>
          </div>

          <a
            href="login.html"
            id="user-link"
            class="text-decoration-none d-flex align-items-center gap-2"
            style="color: var(--primary-color)"
          >
            <span id="user-icon" class="material-symbols-outlined">person</span>
            <span
              id="user-name-display"
              class="font-sans fw-bold"
              style="font-size: 12px; display: none"
            ></span>
          </a>

          <button
            class="btn p-0 border-0 cart-btn"
            onclick="location.href = 'cart.html'"
          >
            <span class="material-symbols-outlined">shopping_bag</span>
            <span id="cart-count" class="cart-badge">0</span>
          </button>

          <button
            class="navbar-toggler border-0 shadow-none p-0"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="material-symbols-outlined">menu</span>
          </button>
        </div>

        <div
          class="collapse navbar-collapse justify-content-center order-md-2"
          id="navbarNav"
        >
          <ul class="navbar-nav gap-md-2">
            <li class="nav-item text-center">
              <a
                class="nav-link nav-link-custom"
                href="home_temp.html#page-intro"
                >GIỚI THIỆU</a
              >
            </li>
            <li class="nav-item text-center">
              <a class="nav-link nav-link-custom" href="home_temp.html#son-li"
                >BỘ SƯU TẬP</a
              >
            </li>
            <li class="nav-item text-center">
              <a
                class="nav-link nav-link-custom"
                href="home_temp.html#company-info"
                >VỀ CHÚNG TÔI</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="py-5">
      <div class="container-xl">
        <div class="row g-5 align-items-center">
          <div class="col-lg-6">
            <div class="product-circle-bg shadow-sm p-md-5">
              <img src="" alt="" class="img-fluid" id="product-img" />
            </div>
          </div>
          <div class="col-lg-6">
            <nav aria-label="breadcrumb" class="mb-4">
              <ol class="breadcrumb small">
                <li class="breadcrumb-item">
                  <a href="home_temp.html#son-li">Sản phẩm</a>
                </li>
                <li class="breadcrumb-item" id="breadcrumb-collection"></li>
                <li class="breadcrumb-item active" id="breadcrumb-name">
                  Tên son
                </li>
              </ol>
            </nav>

            <h1 class="hero-title display-3 mb-2" id="product-name">
              Tên sản phẩm
            </h1>
            <p class="hero-subtitle mb-4" id="product-sub">Dòng sản phẩm</p>
            <div class="mb-4">
              <span class="h2" id="product-price">0đ</span>
            </div>
            <div
              class="text-muted mb-5"
              id="product-desc"
              style="line-height: 1.8; font-size: 0.95rem"
            ></div>
            <div class="d-flex flex-wrap gap-3 align-items-center">
              <div class="quantity-selector">
                <button class="quantity-btn" id="minus-btn" type="button">
                  −
                </button>
                <input
                  type="number"
                  value="1"
                  min="1"
                  class="quantity-input"
                  id="qty-input"
                  readonly
                />
                <button class="quantity-btn" id="plus-btn" type="button">
                  +
                </button>
              </div>

              <button class="btn-atelier" id="add-to-cart-btn">
                <span class="material-symbols-outlined" style="font-size: 20px"
                  >add_shopping_cart</span
                >

                <span style="font-size: 12px">
                  <span class="d-none d-md-inline">THÊM VÀO GIỎ — </span>
                  <span id="total-price-btn">0đ</span>
                </span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <section class="py-5" style="background-color: rgba(127, 52, 66, 0.02)">
      <div class="container-xl py-4">
        <h3 class="hero-title h2 text-center">Khám phá thêm</h3>
        <div class="row g-4 justify-content-center" id="related-products"></div>
      </div>
    </section>

    <div id="toast-container" class="tsot-toast">
      <span class="material-symbols-outlined">check_circle</span>
      <div class="toast-message" id="toast-text">Đã thêm vào túi quà!</div>
    </div>

    <footer class="footer-custom">
      <div class="container-xl">
        <div class="row align-items-center">
          <div class="col-6">
            <p
              class="mb-0"
              style="font-size: 12px; letter-spacing: 0.05em; opacity: 0.8"
            >
              © 2026 <span class="fw-bold">TSOT Lipsticks</span>.<br />All
              rights reserved.
            </p>
          </div>
          <div class="col-6 d-flex justify-content-end">
            <a href="#" class="btn-scroll-top"
              ><span class="material-symbols-outlined">arrow_upward</span></a
            >
          </div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // 1. DATABASE SẢN PHẨM
      const products = {
        "hong-duom": {
          name: "Hồng Đượm",
          collection: "The Matte Series",
          sub: "Màu #M01 — Matte Velvet Lipstick",
          price: 299000,
          img: "https://lh3.googleusercontent.com/aida-public/AB6AXuA5kXyefTzkY02ETfjg218yvhP9087i4neIhfLWPSHv8hp9VWHx61ZhfWLIJZerhPabuW8vlDx4WTkTn0Ee1esZAsi52l40y_yqGvsSfJZ_1Ex3Skzh3KQUqipci9PVSUCnBkf7AX3Qqh85O_jJ_EwI95WsMjbULFz-KG_rZYTlFw_iq7wZr7xlbLuQxyW67briaTa3hIhGeUkDXba1wrmwkL8WxQ58uD873usyqJvIvOrcM1YaEhHvIOtD9oZHjZ1wEowTssAQV6c",
          desc: "Sắc hồng đất ấm áp tôn vinh vẻ đẹp tự nhiên.",
        },
        "do-kieu-sa": {
          name: "Đỏ Kiêu Sa",
          collection: "The Matte Series",
          sub: "Màu #M02 — Matte Velvet Lipstick",
          price: 299000,
          img: "https://lh3.googleusercontent.com/aida-public/AB6AXuDZylEXE9y1BYXdEwqxZgNjy_Hlgmt58niDFCtL92canj8uVexTsm3bE_C2ENkTZDQLkv4RLR_E4s1kjlk3DoeUHm9byn4PwohH5xauj2FZKF4J09pn9np2AKXbp570Iha9MnhEv6SY_udOUnn60uNuoyYSl0xJ8dZxXj-1Ik6VhssLG1pf_0-MRgIPgB1JRzkyBRqFY7kf8Sk3IFrtBlDysDschl32R5Pxi9GKXDRldrYVbJPVFZ2wBX0Iee9kF7mKrsekd-TTtX0",
          desc: "Màu đỏ thuần quyền lực dành cho những quý cô hiện đại.",
        },
        "lua-dao": {
          name: "Lụa Đào",
          collection: "The Gloss Series",
          sub: "Màu #G01 — High Shine Gloss",
          price: 249000,
          img: "https://lh3.googleusercontent.com/aida-public/AB6AXuAetT5PfvhqS5bONW_yVf3EMhttpotXZnsZpPMkro_ZCQrPMNTv5u112wNL2r4yLILes5YWzn6H6isCmk0_l9brfZJCWg1janUUU27_4Dh0Yz0gEOq2Syg8Ct6I1D2XTsF2ausVpEjYRoYYw8ve_72qZeAhJk5yyHkEN2qwz4k-Gw4pFTefSTpKS4vmx6rw8qny1-wyeh-eLJx5Kip3JvJuCqCGjWRRBbsnUKh-5rNmOewcouJZpVkE_-zLW2bNS2c1VCGs0ZNC8FQ",
          desc: "Hiệu ứng căng mọng như pha lê với sắc đào cam nhẹ nhàng.",
        },
        "dau-ban-mai": {
          name: "Dâu Ban Mai",
          collection: "The Gloss Series",
          sub: "Màu #G02 — High Shine Gloss",
          price: 249000,
          img: "https://lh3.googleusercontent.com/aida-public/AB6AXuCijrHKfgY56PJYUbifqywzOgD6S59subLoojyAkvOha9EPK-ew1tGR5F_HZolEmUawQwnG_8vdGfzfXmjwZHFPDvSswUgg86bCerHins3qi_ChIz9Fz1sN5sYY65m8lCRyrTzG3aD4sA4tIHzuNfaAxgWh3F38NRU_FEEvV477AxgdGKYElVe17ihoHw0KRIdIGcSHqKF_DpSmlpSrsOW_cPvbZE8hVsC2IQlfhjzilN-jWAqvWrfdXc2tpjWeQ5oj8KK8bpbfHqg",
          desc: "Sắc hồng dâu ngọt ngào như sương sớm.",
        },
      };

      // 2. KHỞI TẠO DỮ LIỆU TỪ URL
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get("id") || "hong-duom";
      const data = products[productId];

      if (data) {
        // Đổ dữ liệu sản phẩm chính
        document.getElementById("product-name").innerText = data.name;
        document.getElementById("product-img").src = data.img;
        document.getElementById("product-desc").innerText = data.desc;
        document.getElementById("product-price").innerText =
          data.price.toLocaleString("vi-VN") + "đ";
        document.getElementById("product-sub").innerText = data.sub;
        document.getElementById("breadcrumb-name").innerText = data.name;

        // Xử lý breadcrumb collection
        const colEl = document.getElementById("breadcrumb-collection");
        const collectionPath =
          data.collection === "The Gloss Series" ? "son-bong" : "son-li";
        colEl.innerHTML = `<a href="home_temp.html#${collectionPath}">${data.collection}</a>`;

        // 3. LOGIC SỐ LƯỢNG VÀ TÍNH TIỀN TRỰC TIẾP
        const qtyInput = document.getElementById("qty-input");
        const totalPriceBtn = document.getElementById("total-price-btn");
        const minusBtn = document.getElementById("minus-btn");
        const plusBtn = document.getElementById("plus-btn");

        function updateTotal() {
          const qty = parseInt(qtyInput.value) || 1;
          const total = qty * data.price;
          totalPriceBtn.innerText = total.toLocaleString("vi-VN") + "đ";
        }

        if (plusBtn && minusBtn) {
          plusBtn.onclick = () => {
            qtyInput.value = parseInt(qtyInput.value) + 1;
            updateTotal();
          };

          minusBtn.onclick = () => {
            if (parseInt(qtyInput.value) > 1) {
              qtyInput.value = parseInt(qtyInput.value) - 1;
              updateTotal();
            }
          };
        }
        // Chạy lần đầu để hiển thị giá mặc định trong nút
        updateTotal();

        // 4. LOGIC HIỂN THỊ "KHÁM PHÁ THÊM"
        const relatedBox = document.getElementById("related-products");
        let htmlContent = "";

        Object.keys(products).forEach((key) => {
          if (key !== productId) {
            const item = products[key];
            htmlContent += `
          <div class="col-6 col-md-3 text-center">
            <a href="?id=${key}" class="text-decoration-none text-dark">
              <div class="product-circle-bg mb-3" style="transform: scale(0.8)">
                <img src="${item.img}" class="img-fluid" alt="${item.name}">
              </div>
              <h4 class="h6 mb-1 fw-bold">${item.name}</h4>
              <p class="small" style="color: var(--primary-color)">${item.price.toLocaleString("vi-VN")}đ</p>
            </a>
          </div>
        `;
          }
        });
        relatedBox.innerHTML = htmlContent;
      }

      // 5. LOGIC SEARCH
      // 5. LOGIC SEARCH
      const searchToggle = document.getElementById("searchToggle");
      const searchWrapper = document.getElementById("searchWrapper");
      const searchInput = document.getElementById("searchInput");

      if (searchToggle) {
        // Click vào icon để mở/đóng
        searchToggle.addEventListener("click", (e) => {
          e.stopPropagation(); // Ngăn sự kiện nổi bọt lên document
          searchWrapper.classList.toggle("active");
          if (searchWrapper.classList.contains("active")) {
            searchInput.focus();
          }
        });
      }

      // Thêm đoạn này: Click ra ngoài để thu gọn
      document.addEventListener("click", (e) => {
        // Nếu click không nằm trong searchWrapper và searchWrapper đang mở (active)
        if (
          !searchWrapper.contains(e.target) &&
          searchWrapper.classList.contains("active")
        ) {
          searchWrapper.classList.remove("active");
          searchInput.value = ""; // Tùy chọn: xóa nội dung đã nhập khi đóng
        }
      });

      // Ngăn việc click vào ô input làm đóng thanh search
      searchWrapper.addEventListener("click", (e) => {
        e.stopPropagation();
      });

      function updateCartBadge() {
        const cart = JSON.parse(localStorage.getItem("tsot_cart")) || [];
        const badge = document.getElementById("cart-count");
        const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);

        if (totalQty > 0) {
          badge.innerText = totalQty;
          badge.style.display = "flex";
          badge.classList.add("has-items");
        } else {
          badge.style.display = "none";
        }
      }

      // Chạy khi trang vừa load
      document.addEventListener("DOMContentLoaded", () => {
        checkLoginStatus(); // Kích hoạt kiểm tra đăng nhập
        updateCartBadge(); // Cập nhật số lượng giỏ hàng
        // Các logic load sản phẩm khác giữ nguyên...
      });
      document.getElementById("add-to-cart-btn").onclick = () => {
        let cart = JSON.parse(localStorage.getItem("tsot_cart")) || [];
        const qty = parseInt(document.getElementById("qty-input").value);

        const existingIndex = cart.findIndex((item) => item.id === productId);

        if (existingIndex > -1) {
          cart[existingIndex].quantity += qty;
        } else {
          cart.push({
            id: productId,
            name: data.name,
            price: data.price,
            img: data.img,
            quantity: qty,
            sub: data.sub,
          });
        }

        localStorage.setItem("tsot_cart", JSON.stringify(cart));
        updateCartBadge();

        // THAY THẾ ALERT BẰNG LOGIC TOAST
        const toast = document.getElementById("toast-container");
        const toastText = document.getElementById("toast-text");

        toastText.innerText = `Đã thêm ${qty} ${data.name} vào giỏ hàng!`;
        toast.classList.add("show");

        // Tự động ẩn sau 3 giây
        setTimeout(() => {
          toast.classList.remove("show");
        }, 3000);
      };
      function checkLoginStatus() {
        const user = JSON.parse(localStorage.getItem("tsot_user"));
        const userLink = document.getElementById("user-link");
        const userIcon = document.getElementById("user-icon");
        const userNameDisplay = document.getElementById("user-name-display");

        if (user && user.fullName) {
          // 1. Chuyển hướng link sang trang profile
          userLink.href = "profile.html";
          // 2. Làm icon "đặc" lại (FILL: 1)
          userIcon.style.fontVariationSettings =
            "'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24";
          // 3. Hiện tên User in hoa
          userNameDisplay.innerText = user.fullName.toUpperCase();
          userNameDisplay.style.display = "inline";
        }
      }
    </script>
  </body>
</html>
