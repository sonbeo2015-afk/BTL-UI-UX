<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link

      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />

    <style>
      :root {
        --primary-color: rgb(127, 52, 66);
        --faded-color: rgba(127, 52, 66, 0.3);
        --bg-creme: #fcf9f4;
      }
      body {
        background-color: var(--bg-creme);
        color: #1c1917;
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      /* --- NAVBAR --- */
      .navbar-custom {
        background-color: var(--bg-creme);
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        padding: 1rem 2rem;
      }
      .brand-name {
        font-family: "Noto Serif", serif;
        font-style: italic;
        font-weight: 500;
        color: var(--primary-color);
        font-size: 1.5rem;
        text-decoration: none;
      }
      .nav-link-custom {
        font-family: "Plus Jakarta Sans", sans-serif;
        font-size: 11px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #57534e !important;
        transition: all 0.3s ease;
        font-weight: 500;
        position: relative;
        padding: 0.5rem 0 !important;
        margin: 0 1.5rem;
        display: inline-block;
        text-decoration: none;
      }
      .nav-link-custom::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 1px;
        background-color: var(--primary-color);
        transition: width 0.3s ease;
      }
      .nav-link-custom:hover::after {
        width: 100%;
      }

      .search-input-wrapper {
        border-bottom: 2px solid rgba(127, 52, 66, 0.1);
        display: flex;
        align-items: center;
        padding-bottom: 5px;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        width: 28px;
        overflow: hidden;
        white-space: nowrap;
      }
      .search-icon {
        cursor: pointer;
        font-size: 20px !important;
        color: var(--primary-color);
        flex-shrink: 0;
      }
      .search-input-wrapper input {
        border: none;
        background: transparent;
        font-size: 10px;
        letter-spacing: 0.12em;
        outline: none;
        width: 0;
        opacity: 0;
        transition: all 0.3s ease;
      }
      .search-input-wrapper.active {
        width: 160px;
        border-bottom: 2px solid var(--primary-color);
      }
      .search-input-wrapper.active input {
        width: 120px;
        opacity: 1;
        margin-left: 8px;
      }

      .cart-btn {
        position: relative;
        color: var(--primary-color);
      }
      .cart-badge {
        position: absolute;
        top: -5px;
        right: -8px;
        background-color: var(--primary-color);
        color: white;
        font-size: 9px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        display: none;
        align-items: center;
        justify-content: center;
      }

      /* --- PRODUCT DETAIL --- */
      .product-circle-bg {
        background-color: #f5f5f4;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        aspect-ratio: 1/1;
        overflow: hidden;
      }
      .product-circle-bg img {
        width: 80%;
        height: 80%;
        object-fit: contain;
      }
      .hero-title {
        font-family: "Noto Serif", serif;
        font-style: italic;
        font-weight: 300;
        line-height: 1.1;
        color: var(--primary-color);
      }
      .hero-subtitle {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.4em;
        color: var(--primary-color);
        opacity: 0.7;
      }
      #product-price {
        color: var(--primary-color) !important;
        font-weight: 300;
      }
      /* --- CẬP NHẬT NÚT ADD TO CART --- */
      .btn-atelier {
        background-color: var(--primary-color);
        color: white;
        border-radius: 9999px;
        height: 42px; /* Đặt chiều cao cố định để dễ căn chỉnh */
        padding: 0 25px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border: none;
        transition: 0.3s;

        /* Thêm các thuộc tính này để center nội dung */
        display: inline-flex;
        align-items: center; /* Căn giữa trục dọc */
        justify-content: center; /* Căn giữa trục ngang */
        gap: 10px; /* Khoảng cách giữa icon và text */
      }

      /* Đảm bảo icon Material Symbol cũng được căn giữa */
      .btn-atelier .material-symbols-outlined {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 0; /* Loại bỏ margin thừa nếu có */
      }
      .btn-atelier:hover {
        background-color: rgba(127, 52, 66, 0.4);
        color: rgb(127, 52, 66);
      }
      .btn-atelier:active {
        background-color: rgba(127, 52, 66, 0.1);
      }
      /* --- QUANTITY SELECTOR REFINED --- */
      .quantity-selector {
        display: flex;
        align-items: center;
        justify-content: space-between; /* Khoảng cách đều giữa các phần tử */
        border: 1px solid var(--primary-color);
        border-radius: 999px;
        background-color: var(--bg-creme);
        padding: 2px 8px; /* Giảm padding để nút bé hơn */
        width: 100px; /* Chiều rộng cố định để kiểm soát kích thước nút */
        height: 36px; /* Chiều cao cố định */
      }

      .quantity-btn {
        background: none;
        border: none;
        color: var(--primary-color);
        font-size: 1.2rem;
        cursor: pointer;
        width: 24px; /* Chiều rộng nút bấm bằng chiều cao để tạo hình vuông ngầm */
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center; /* Căn giữa dấu - và + */
        padding: 0;
        transition: opacity 0.2s;
      }

      .quantity-btn:hover {
        opacity: 0.6;
      }

      .quantity-input {
        width: 30px;
        text-align: center;
        border: none;
        background: none;
        font-weight: 600;
        color: var(--primary-color);
        outline: none;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0; /* Loại bỏ margin mặc định */
      }

      /* Ẩn mũi tên tăng giảm mặc định của input number */
      .quantity-input::-webkit-outer-spin-button,
      .quantity-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .breadcrumb-item a {
        color: #8c8a87;
        text-decoration: none;
        transition: color 0.3s;
      }
      .breadcrumb-item a:hover {
        color: var(--primary-color);
      }
      .breadcrumb-item.active {
        color: var(--primary-color) !important;
        font-weight: 600;
      }
      .breadcrumb-item + .breadcrumb-item::before {
        content: "—";
        color: var(--faded-color);
        padding: 0 10px;
      }

      .footer-custom {
        background-color: var(--primary-color);
        color: white;
        padding: 1.5rem 0;
      }
      .btn-scroll-top {
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.3);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        text-decoration: none;
      }

      .btn-scroll-top:hover {
        background: white;
        color: var(--primary-color);
        transform: translateY(-3px);
      }
      /* --- TOAST NOTIFICATION --- */
      .tsot-toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: white;
        color: var(--primary-color);
        padding: 16px 24px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(127, 52, 66, 0.15);
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 9999;
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.5s ease;
      }

      .tsot-toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      .tsot-toast .material-symbols-outlined {
        font-size: 20px;
      }

      .toast-message {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      /* Thiết lập trạng thái mặc định cho danh sách sản phẩm liên quan */
      #related-products {
        transition:
          opacity 0.3s ease,
          transform 0.3s ease;
        opacity: 1;
        transform: translateY(0);
      }

      /* Lớp phụ để kích hoạt khi chuyển trang (mờ đi và hạ thấp xuống một chút) */
      #related-products.fade-out {
        opacity: 0;
        transform: translateY(10px);
      }
    </style>
  </head>

    <main class="py-5">

                />
                <button class="quantity-btn" id="plus-btn" type="button">
                  +
                </button>
              </div>

              <button class="btn-atelier" id="add-to-cart-btn">

                  <span id="total-price-btn">0đ</span>
                </span>

          </div>

      </div>
    </section>

      </div>

          price: 249000,
          img: "https://lh3.googleusercontent.com/pw/AP1GczMtz2-OHmgkyvc6Zi3sK6ZlwJCF-hYg3NIhl3zpR95JAW4Du50PS9yhQ2vg9G7GV7Xyb78QqYa3BO58rL6XqRLE2U3w4QDvS0UDOVxvnRrYEf5ncNCOLiGh7Pqz67UvMpTVY0NTFmIT8BDZcDJApbDs=w1254-h1254-s-no-gm",
          desc: "Sắc cam đào trong trẻo, rạng rỡ như những vạt nắng sớm xuyên qua ô cửa kính thủy tinh.",
        },
      };

      // 2. KHỞI TẠO DỮ LIỆU TỪ URL
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get("id") || "hong-duom";
      const data = products[productId];

      if (data) {
        // Đổ dữ liệu sản phẩm chính
        document.getElementById("product-name").innerText = data.name;
        document.getElementById("product-img").src = data.img;
        document.getElementById("product-desc").innerText = data.desc;
        document.getElementById("product-price").innerText =
          data.price.toLocaleString("vi-VN") + "đ";
        document.getElementById("product-sub").innerText = data.sub;
        document.getElementById("breadcrumb-name").innerText = data.name;

        // Xử lý breadcrumb collection
        const colEl = document.getElementById("breadcrumb-collection");
        const collectionPath =
          data.collection === "The Gloss Series" ? "son-bong" : "son-li";
        colEl.innerHTML = `<a href="index.html#${collectionPath}">${data.collection}</a>`;

        // 3. LOGIC SỐ LƯỢNG VÀ TÍNH TIỀN TRỰC TIẾP
        const qtyInput = document.getElementById("qty-input");
        const totalPriceBtn = document.getElementById("total-price-btn");
        const minusBtn = document.getElementById("minus-btn");
        const plusBtn = document.getElementById("plus-btn");

        function updateTotal() {
          const qty = parseInt(qtyInput.value) || 1;
          const total = qty * data.price;
          totalPriceBtn.innerText = total.toLocaleString("vi-VN") + "đ";
        }

        if (plusBtn && minusBtn) {
          plusBtn.onclick = () => {
            qtyInput.value = parseInt(qtyInput.value) + 1;
            updateTotal();
          };

          minusBtn.onclick = () => {
            if (parseInt(qtyInput.value) > 1) {
              qtyInput.value = parseInt(qtyInput.value) - 1;
              updateTotal();
            }
          };
        }
        // Chạy lần đầu để hiển thị giá mặc định trong nút
        updateTotal();

        // 4. LOGIC HIỂN THỊ "KHÁM PHÁ THÊM" (PHÂN TRANG ĐỘNG)
        const relatedBox = document.getElementById("related-products");
        const prevBtn = document.getElementById("prev-related-btn");
        const nextBtn = document.getElementById("next-related-btn");

        // Lọc danh sách các sản phẩm khác sản phẩm hiện tại
        const relatedKeys = Object.keys(products).filter(
          (key) => key !== productId,
        );

        let currentPage = 0;

        // Hàm tính toán số lượng sản phẩm trên 1 trang dựa theo kích thước màn hình
        function getItemsPerPage() {
          const width = window.innerWidth;
          if (width < 576) return 2; // Mobile: tối đa 2 sản phẩm
          return 3; // Tablet & PC: tối đa 3 sản phẩm
        }

        // Hàm xử lý render dữ liệu lên giao diện
        function renderRelatedProducts() {
          const itemsPerPage = getItemsPerPage();
          const startIndex = currentPage * itemsPerPage;
          const endIndex = startIndex + itemsPerPage;

          // Lấy mảng key sản phẩm thuộc trang hiện tại
          const pageItems = relatedKeys.slice(startIndex, endIndex);

          let htmlContent = "";
          pageItems.forEach((key) => {
            const item = products[key];
            htmlContent += `
                <div class="text-center" style="flex: 1; min-width: 0; max-width: calc((100% - 3rem) / ${itemsPerPage});">
                  <a href="?id=${key}" class="text-decoration-none text-dark d-block h-100">
                    <div class="product-circle-bg mb-3" style="transform: scale(0.85); background-color: #f5f5f4;">
                      <img src="${item.img}" class="img-fluid" alt="${item.name}">
                    </div>
                    <h4 class="h6 mb-1 fw-bold text-truncate">${item.name}</h4>
                    <p class="small text-muted mb-0">${item.price.toLocaleString("vi-VN")}đ</p>
                  </a>
                </div>
              `;
          });

          relatedBox.innerHTML = htmlContent;

          // Cập nhật trạng thái ẩn/hiện hoặc làm mờ của nút điều hướng nếu hết trang
          prevBtn.style.opacity = currentPage === 0 ? "0.3" : "1";
          prevBtn.disabled = currentPage === 0;

          const maxPage = Math.ceil(relatedKeys.length / itemsPerPage) - 1;
          nextBtn.style.opacity = currentPage >= maxPage ? "0.3" : "1";
          nextBtn.disabled = currentPage >= maxPage;
        }

        // Sự kiện click nút lùi (<)
        prevBtn.onclick = () => {
          if (currentPage > 0) {
            currentPage--;
            renderRelatedProducts();
          }
        };

        // Sự kiện click nút tiến (>)
        nextBtn.onclick = () => {
          const itemsPerPage = getItemsPerPage();
          const maxPage = Math.ceil(relatedKeys.length / itemsPerPage) - 1;
          if (currentPage < maxPage) {
            currentPage++;
            renderRelatedProducts();
          }
        };

        // Lắng nghe sự kiện thay đổi kích thước màn hình để tự căn chỉnh lại số sản phẩm
        window.addEventListener("resize", () => {
          currentPage = 0;
          renderRelatedProducts();
        });

        // Khởi chạy render lần đầu tiên
        renderRelatedProducts();

        // --- ĐÂY LÀ DẤU NGOẶC QUAN TRỌNG ĐỂ ĐÓNG KHỐI LỆNH IF (DATA) ---
      }

      // 5. LOGIC SEARCH (Độc lập nằm ngoài khối "if data" để trang không lỗi nếu lỡ nhập sai ID)
      const searchToggle = document.getElementById("searchToggle");
      const searchWrapper = document.getElementById("searchWrapper");
      const searchInput = document.getElementById("searchInput");

      if (searchToggle && searchWrapper && searchInput) {
        searchToggle.addEventListener("click", (e) => {
          e.stopPropagation();
          searchWrapper.classList.toggle("active");
          if (searchWrapper.classList.contains("active")) {
            searchInput.focus();
          }
        });

        document.addEventListener("click", (e) => {
          if (
            !searchWrapper.contains(e.target) &&
            searchWrapper.classList.contains("active")
          ) {
            searchWrapper.classList.remove("active");
            searchInput.value = "";
          }
        });

        searchWrapper.addEventListener("click", (e) => {
          e.stopPropagation();
        });
      }

      function updateCartBadge() {
        const cart = JSON.parse(localStorage.getItem("tsot_cart")) || [];
        const badge = document.getElementById("cart-count");
        const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);

        if (totalQty > 0) {
          badge.innerText = totalQty;
          badge.style.display = "flex";
          badge.classList.add("has-items");
        } else {
          badge.style.display = "none";
        }
      }

      // Chạy khi trang vừa load hoàn tất DOM
      document.addEventListener("DOMContentLoaded", () => {
        checkLoginStatus();
        updateCartBadge();
      });

      // Gán sự kiện Thêm vào giỏ hàng
      if (data) {
        document.getElementById("add-to-cart-btn").onclick = () => {
          let cart = JSON.parse(localStorage.getItem("tsot_cart")) || [];
          const qty = parseInt(document.getElementById("qty-input").value);
          const existingIndex = cart.findIndex((item) => item.id === productId);

          if (existingIndex > -1) {
            cart[existingIndex].quantity += qty;
          } else {
            cart.push({
              id: productId,
              name: data.name,
              price: data.price,
              img: data.img,
              quantity: qty,
              sub: data.sub,
            });
          }

          localStorage.setItem("tsot_cart", JSON.stringify(cart));
          updateCartBadge();

          // Hiển thị TOAST thông báo thành công
          const toast = document.getElementById("toast-container");
          const toastText = document.getElementById("toast-text");

          toastText.innerText = `Đã thêm ${qty} ${data.name} vào giỏ hàng!`;
          toast.classList.add("show");

          setTimeout(() => {
            toast.classList.remove("show");
          }, 3000);
        };
      }

      function checkLoginStatus() {
        const user = JSON.parse(localStorage.getItem("tsot_user"));
        const userLink = document.getElementById("user-link");
        const userIcon = document.getElementById("user-icon");
        const userNameDisplay = document.getElementById("user-name-display");

        if (user && user.fullName) {
          userLink.href = "profile.html";
          userIcon.style.fontVariationSettings =
            "'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24";
          userNameDisplay.innerText = user.fullName.toUpperCase();
          userNameDisplay.style.display = "inline";
        }
      }
    </script>
  </body>
</html>
